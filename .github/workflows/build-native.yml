# complete build, release upload and test
---
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'cloud/**'
      - 'doc/**'
      - 'fuzzer/**'
      - 'kobo/**'
      - 'python/**'
      - '.github/workflows/build-container.yml'
      - '.github/workflows/build-unix.yml'
      - '.github/workflows/build-translation.yml'
      - '.readthedocs.yaml'
    branches:
      - master
      - dev-branch
    tags:
      - 'v*'

  pull_request:
    paths-ignore:
      - 'cloud/**'
      - 'doc/**'
      - 'fuzzer/**'
      - 'kobo/**'
      - 'python/**'
      - '.github/workflows/build-container.yml'
      - '.github/workflows/build-unix.yml'
      - '.github/workflows/build-translation.yml'
      - '.readthedocs.yaml'
    branches:
      - master
      # - dev-branch

env:
  DEBUG: y
  BOOST: boost_1_87_0
  BUILD_TARGETS: UNIX,WIN64,PC
  TEST_TARGETS: UNIX,KOBO

jobs:
  release:
    name: "Create Release"
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Parse changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=$(echo "${{ github.ref }}" | cut -f3 -d '/')
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo 'CHANGELOGENTRY<<EOF' >> $GITHUB_ENV
          ./tools/changelog.sh "$TAG" >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV
          case "$TAG" in
            *-rc*)
              echo "PRERELEASE=true" >> $GITHUB_ENV
              ;;
            *)
              echo "PRERELEASE=false" >> $GITHUB_ENV
              ;;
          esac
        id: changelogentry

      - name: Create release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1.1.4
        # uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          allowUpdates: true
          name: Version ${{ github.ref_name }}
          body: ${{ env.CHANGELOGENTRY }}
          prerelease: ${{ env.PRERELEASE }}

      - name: Get OpenSoar Version
        id: get_version
        run: |
          echo "Get OpenSoar Version"
          echo "CurrDir = $(pwd)"

  test: # step3, but aligned with 'build-dev-test.yml'
    runs-on: ${{ matrix.os }}
    needs: build # step2
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: UNIX
            # target_container: debian:bookworm-slim

          - os: ubuntu-22.04
            target: UNIX
            target_container: debian:bookworm-slim

          - os: ubuntu-24.04
            target: UNIX

          - os: macos-14
            target: OSX64

          - os: macos-15
            target: OSX64

          - os: macos-15-intel
            target: OSX64

          - os: macos-14
            target: MACOS
 
          - os: macos-15
            target: MACOS

          - os: macos-14
            target: IOS64

          - os: macos-15
            target: IOS64

          - os: windows-2022
            target: WIN64

          - os: windows-2022
            target: PC

          - os: windows-2025
            target: WIN64

          - os: windows-latest
            target: WIN64

    container: ${{ matrix.target_container }}
    continue-on-error: true
    steps:
      - id: checkout
        uses: actions/checkout@v5

      - name: Install checkout dependencies (Ubuntu)
        if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        run: |
          echo "Install checkout dependencies: ${{ matrix.target }} "
          if [ -z ${{ matrix.target_container }} ]; then
            # test w/o container:
            sudo apt-get update
            sudo apt-get install -y libfmt-dev libgeotiff-dev
          else
            ./ide/provisioning/install-debian-packages.sh UPDATE BASE LINUX
          fi

      - name: Install checkout dependencies (MacOS)
        if: ${{ startsWith(matrix.os, 'macos-') }}
        run: |
          echo "Install checkout dependencies: ${{ matrix.target }} "
          brew install fmt

      - name: Set Git Variables
        if: ${{ ! startsWith(matrix.os, 'windows-') && (env.TEST_COMMIT == '') }}
        run: |
          echo "Set Git Variables"
          COMMIT=$(echo $GITHUB_SHA | head -c 7)
          RUN_ID=${{ github.run_id }}
          echo "GIT_COMMIT=$COMMIT" >> $GITHUB_ENV
          echo "TEST_COMMIT=$COMMIT" >> $GITHUB_ENV
          echo "TEST_RUN_ID=$RUN_ID" >> $GITHUB_ENV
      
      - name: Set Git Variables (Windows)
        if: ${{ startsWith(matrix.os, 'windows-')  && (env.TEST_COMMIT == '') }}
        run: |
          echo "Set Git Variables (Windows)"
          $COMMIT = $env:GITHUB_SHA.substring(0,7)
          $RUN_ID=${{ github.run_id }}
          echo "GIT_COMMIT=$COMMIT" >> $env:GITHUB_ENV
          echo "TEST_COMMIT=$COMMIT" >> $env:GITHUB_ENV
          echo "TEST_RUN_ID=$RUN_ID" >> $env:GITHUB_ENV
          echo "========================"

      - name: Test Variables
        run: |
          echo "test-run-id: ${{ env.TEST_RUN_ID }}"
          echo "current run-id: ${{ github.run_id }}"
          echo "github-token: ${{ github.token }}"
          echo "name: Test-${{ env.TEST_COMMIT }}-${{ matrix.target }}"
          echo "path: ${{ github.workspace }}/${{ matrix.target }}/bin"

      - name: Fetch Artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ env.TEST_RUN_ID }}  
          github-token: ${{ github.token }}
          name: Test-${{ env.TEST_COMMIT }}-${{ matrix.target }}
          path: ${{ github.workspace }}/output/${{ matrix.target }}/bin

      - name: Run Test Programs on ${{ matrix.target }}
        run: |
          echo "Run Test Programs on ${{ matrix.target }}"
          chmod +x ./output/${{ matrix.target }}/bin/*
          # chmod -R +x ${{ github.workspace }}/*
          echo "run tests on Target '${{ matrix.target }}'"
          make check-no-build TARGET=${{ matrix.target }}
        working-directory: ${{ github.workspace }}

  build: # step 2
    # if: ${{ startsWith('UNIX,MACOS,WIN64', 'UNIX') }}
    runs-on: ${{ matrix.os }}
    needs: release
    container: ${{ matrix.target_container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: ANDROIDAARCH64
            target_bin: OpenSoar
            target_final: OpenSoar
            target_ext: .apk
            target_test: false
            target_upload: true
            ndk: r28
            target_container: debian:bookworm-slim
          
          - os: ubuntu-24.04
            target: ANDROID
            target_bin: OpenSoar
            target_final: OpenSoar
            target_ext: .apk
            target_test: false
            target_upload: true
            ndk: r28
            target_container: debian:bookworm-slim
          #### needs very long time.. 
          ### August2111: Disabled because long time...
          - os: ubuntu-24.04
            target: ANDROIDFAT
            target_hide: true  # ${{ REDUCED_BUILD }}
            target_bin: OpenSoar
            target_final: OpenSoar
            target_ext: .apk
            target_test: false
            target_upload: true
            ndk: r28
            target_container: debian:bookworm-slim
            # ------------------------------------------------------
          - os: ubuntu-24.04      # - os: ubuntu-22.04
            target: UNIX
            target_bin: OpenSoar
            target_final: OpenSoar
            # target_bin: OpenSoar_${{ needs.release.outputs.version }}_amd64
            # target_final: OpenSoar_
            target_ext: .deb
            target_test: true
            target_upload: true
            target_container: debian:bookworm-slim    # => Ubuntu 24.04
            #  target_container: debian:bullseye-slim # => Ubuntu 22.04
          
          - os: ubuntu-22.04
            target: WIN64
            target_bin: OpenSoar
            target_final: OpenSoar
            target_ext: .exe
            target_test: false
            target_upload: false
            target_container: debian:bookworm-slim
          
          - os: ubuntu-24.04
            target: WIN64
            target_bin: OpenSoar
            target_final: OpenSoar
            target_ext: .exe
            target_test: true
            target_upload: true
            target_container: debian:bookworm-slim
          
          - os: ubuntu-24.04
            target: PC
            target_bin: OpenSoar
            target_final: OpenSoar
            target_ext: .exe
            target_test: true
            target_upload: true
            target_container: debian:bookworm-slim

          - os: macos-15-intel
            target: OSX64
            target_bin: OpenSoar
            target_final: OpenSoar
            target_ext: ''
            target_test: true
            target_upload: true
            # w/o container

          - os: macos-15
            target: MACOS
            target_bin: OpenSoar
            target_final: OpenSoar
            target_ext: ''
            target_test: true
            target_upload: true
            # w/o container
          
          - os: macos-15
            target: IOS64
            target_bin: OpenSoar
            target_final: OpenSoar
            target_ext: ''
            target_test: true
            target_upload: true
            # w/o container
        # exclude:
          #### needs long time.. 
          - os: ubuntu-22.04
            target: KOBO
            target_bin: OpenSoar
            target_final: KoboRoot
            target_ext: .tgz
            target_test: false
            target_upload: true
            target_container: debian:bookworm-slim
  
    steps:
      - name: Check Git Variables
        # if: contains(env.BUILD_TARGETS, ${{ matrix.target }})
        run: |
          echo "(No) Check Git variables"
          COMMIT=$(echo $GITHUB_SHA | head -c 7)
          echo "GIT_COMMIT=$COMMIT" >> $GITHUB_ENV
        
      - name: Install checkout dependencies
        if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        run: |
          echo "Install checkout dependencies: ${{ matrix.target }} "
          apt-get update
          apt-get install -y --no-install-recommends git \
            ca-certificates rsync openssh-client
  
      - name: Set environment variables
        run: |
            case ${{ matrix.target }} in
                ANDROID | ANDROIDFAT | ANDROIDAARCH64)
                  echo "BINARY_DIR=output/ANDROID/bin" >> $GITHUB_ENV
                  ;;
                KOBO)
                  echo "BINARY_DIR=output/${{ matrix.target }}/KoboRoot" >> $GITHUB_ENV
                  ;;
                UNIX)
                  echo "BINARY_DIR=output/${{ matrix.target }}/bin" >> $GITHUB_ENV
                  ;;
                *)
                  echo "BINARY_DIR=output/${{ matrix.target }}/bin" >> $GITHUB_ENV
                  ;;
            esac
            
            echo "DEBUG=${{ env.DEBUG }}"
            case ${{ matrix.target }} in
                OSX64 | IOS64 | MACOS)
                  PHYS_KERNELS=$(sysctl -n hw.physicalcpu)
                  echo "BUILD_PARAMS=-j$PHYS_KERNELS TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 OPTIMIZE=-O0" >> $GITHUB_ENV
                  echo "BUILDER=gmake" >> $GITHUB_ENV
                  ;;
                *)
                  PHYS_KERNELS=$(nproc)
                  echo "BUILD_PARAMS=-j$PHYS_KERNELS TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2" >> $GITHUB_ENV
                  echo "BUILDER=make" >> $GITHUB_ENV
                  ;;
            esac
            
            echo "PHYS_KERNELS=$PHYS_KERNELS" >> $GITHUB_ENV
            if ${{ matrix.target_test }} ; then echo "IS_TEST=everything" >> $GITHUB_ENV; fi

      - name: Set vars for release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "Set vars for release: ${{ matrix.target }} "
          if [ ${{ secrets.TEST }} = '123456' ]; then
            echo "secrets detected"
          else 
            echo "secrets NOT detected"
          fi
          
          if [ ${{ startsWith(github.ref, 'refs/tags/v') }} = true ]; then
            echo "DEBUG=y" >> $GITHUB_ENV
            if [ ${{ matrix.target_final }} = "OpenSoar" ]; then
              echo "TARGET_FINAL=${{ matrix.target_final }}" >> $GITHUB_ENV
            fi
          elif [ ${{ matrix.target }} = 'WIN64' ]; then
            # August2111: with WIN64 don't use the Debug option
            echo "no DEBUG flag"
            echo "DEBUG=y" >> $GITHUB_ENV
          fi

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
  
      - name: Cache ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.target }}-ccache
  
      - name: "Cache Boost"
        uses: actions/cache@v4
        with:
          key: ${{ env.BOOST }}-${{ hashFiles('lib/boost/patches/**') }}
          path: |
            ${{ github.workspace }}/output/download/${{ env.BOOST }}.tar.bz2
            ${{ github.workspace }}/output/src/stamp-${{ env.BOOST }}
            ${{ github.workspace }}/output/src/${{ env.BOOST }}/boost
  
      - name: Install dependencies
        run: |
          echo "Install dependencies: ${{ matrix.target }}"
          echo "CurrDir = $(pwd)"
          git config --global --add safe.directory $GITHUB_WORKSPACE
          echo "GITHUB_WORKING: ${{ matrix.target }}"
          echo "github.workspace = ${{ github.workspace }}"
          echo "GITHUB_WORKSPACE = $GITHUB_WORKSPACE"
          echo "GITHUB_SHA       = $GITHUB_SHA"
          echo "GITHUB_HASH      = $GITHUB_HASH"
          echo "GIT_COMMIT       = $GIT_COMMIT"
  
          if [ ${{ startsWith(matrix.os, 'ubuntu-') }} = true ]; then
            ./ide/provisioning/install-debian-packages.sh UPDATE BASE LINUX
            case ${{ matrix.target }} in
              ANDROID | ANDROIDFAT | ANDROIDAARCH64)
                ./ide/provisioning/install-debian-packages.sh ARM LLVM ANDROID
                ./ide/provisioning/install-android-tools.sh NDK SDK
                ;;
              WIN64 | WIN32 | PC)
                # echo "git_hash=$(shell git rev-parse --short --verify HEAD )" >> $GITHUB_ENV
                ./ide/provisioning/install-debian-packages.sh WIN
                ;;
              UNIX)
                ./ide/provisioning/install-debian-packages.sh
                ### ./ide/provisioning/install-debian-packages.sh LIBINPUT_GBM DEBIAN
                ;;
              KOBO)
                ./ide/provisioning/install-debian-packages.sh ARM KOBO
                ;;
            esac
            ## unknown section!!!: ./ide/provisioning/install-debian-packages.sh CLEAN
          elif [ ${{ startsWith(matrix.os, 'macos-') }} = true ] ; then
            ./ide/provisioning/install-darwin-packages.sh BASE
            ./ide/provisioning/install-darwin-packages.sh ${{ matrix.target }}            
          fi
  
      - name: Prepare signing key
        shell: bash
        if: ${{ startsWith(matrix.target, 'ANDROID') && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "Prepare signing key: ${{ matrix.target }}"
          # please use secrets.XCSOAR_UPLOAD_KEY... for secrets.OPENSOAR_UPLOAD_KEY to be
          # compatible with repo XCSoar/XCSoar
          if [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_BASE64 }}" ]; then
            mkdir -p ~/.android/
            echo "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_BASE64 }}" | base64 -d > ~/.android/signing-key.jks
            md5sum ~/.android/signing-key.jks
          fi
  
      - name: Compile OpenSoar - PR
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "Compile OpenSoar - PR: ${{ matrix.target }}"
          # ===========================================================
          # after Build:
          case ${{ matrix.target }} in
              ANDROID | ANDROIDFAT | ANDROIDAARCH64)
                ${{ env.BUILDER }} ${{ env.BUILD_PARAMS }} ${{ env.IS_TEST }} 
                mv output/ANDROID/bin/${{ matrix.target_bin }}-debug${{ matrix.target_ext }} ${{ matrix.target_bin }}${{ matrix.target_ext }}
                ;;
              KOBO)
                ${{ env.BUILDER }} ${{ env.BUILD_PARAMS }} ${{ env.IS_TEST }} 
                # do nothing with Kobo files...
                ;;
                
              UNIX)
                 # no exra build before necessary!
                 # do nothing with deb files or Kobo files...
                 DEB_BUILD_OPTIONS=ccache,noopt dpkg-buildpackage --jobs-force=${{ env.PHYS_KERNELS }} --no-sign
                 mkdir -p public/${{ matrix.target }}
                 # to big: cp -vf ../opensoar_7.43-3.24.* public/${{ matrix.target }}
                 cp -v ../*.dsc public/${{ matrix.target }}
                 cp -v ../*.deb public/${{ matrix.target }}
                ;;
                
              *)
                ${{ env.BUILDER }} ${{ env.BUILD_PARAMS }} ${{ env.IS_TEST }} 
                mv output/${{ matrix.target }}/bin/${{ matrix.target_bin }}${{ matrix.target_ext }} ${{ matrix.target_bin }}${{ matrix.target_ext }}
                ;;
          esac

      - name: Test Directory (UNIX)
        ### if: ${{ startsWith(matrix.target, 'UNIX') }}
        run: |
          echo "----------------------------------------------------------------"
          ### echo "find . -name '*.deb'"
          ### echo "=============================================================="
          ### find . -name "*.deb"
          ### echo "=============================================================="
          ls -l ./public/${{ matrix.target }}
          echo "----------------------------------------------------------------"
      - name: Upload Test artifact
        uses: actions/upload-artifact@v5
        if: ${{ matrix.target_test }}
        with:
          name: Test-${{ env.GIT_COMMIT }}-${{ matrix.target }}
          path: |
            ${{ env.BINARY_DIR }}/Test*
            ${{ env.BINARY_DIR }}/test_*
          # README.md
          retention-days: 1

      - name: Compile OpenSoar - Sanitizer Check
        # !!!!August2111:
        if: ${{ matrix.target == 'unknown' && !startsWith(github.ref, 'refs/tags/v') && github.ref == 'refs/heads/master'  }}
        #  if: ${{ matrix.target == 'UNIX' && !startsWith(github.ref, 'refs/tags/v') && github.ref == 'refs/heads/master'  }}
        run: |
          echo "Unix - Sanitizer Check"
          ${{ env.BUILDER }} -j${{ env.PHYS_KERNELS }} TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything VFB=y SANITIZE=y DEBUG_GLIBCXX=y
  
      - name: Compile OpenSoar - Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "Compile OpenSoar - Release"
          # please use secrets.XCSOAR_UPLOAD_KEY... for secrets.OPENSOAR_UPLOAD_KEY to be
          # compatible with repo XCSoar/XCSoar
            case ${{ matrix.target }} in
              ANDROID | ANDROIDFAT | ANDROIDAARCH64))
                if [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_PASSWORD }}" ] && [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_KEY_ALIAS }}" ]; then
                  ANDROID_KEYSTORE_PASS=${{ secrets.XCSOAR_UPLOAD_KEY_JKS_PASSWORD }} \
                  ${{ env.BUILDER }} -j${{ env.PHYS_KERNELS }} TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 \
                  output/ANDROID/bin/${{ matrix.target_bin }}${{ matrix.target_ext }} \
                  ANDROID_KEYSTORE=~/.android/signing-key.jks ANDROID_KEY_ALIAS=${{ secrets.XCSOAR_UPLOAD_KEY_JKS_KEY_ALIAS }}
                else
                  ${{ env.BUILDER }} -j${{ env.PHYS_KERNELS }} TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 \
                  output/ANDROID/bin/${{ matrix.target_bin }}${{ matrix.target_ext }}
                fi
                ;;
              WIN64 | WIN32 | PC)
                ${{ env.BUILDER }} -j${{ env.PHYS_KERNELS }} TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything
                ;;
              KOBO)
                ${{ env.BUILDER }} -j${{ env.PHYS_KERNELS }} TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 output/${{ matrix.target }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
                ;;
              UNIX)
                dpkg-buildpackage --version
                DEB_BUILD_OPTIONS=ccache dpkg-buildpackage --jobs-force=${{ env.PHYS_KERNELS }} --no-sign
                ;;
              OSX64 | IOS64 | MACOS)
                ${{ env.BUILDER }} -j${{ env.PHYS_KERNELS }} TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 OPTIMIZE="-O0"
                ;;
            esac
  
      - name: Upload Release artifact
        uses: actions/upload-artifact@v5
        # if: ${{ (matrix.target_upload || startsWith(github.ref, 'refs/tags/v')) }} 
        if: ${{ matrix.target_upload }} 
        with:
          name: ${{ matrix.target_final }}-${{ env.GIT_COMMIT }}-${{ matrix.target }}  # ${{ matrix.target_ext }}
          path: |
            public/${{ matrix.target }}/*.*
          retention-days: 2
  
      ####- name: Test Directory (UNIX)
      ####  if: ${{ startsWith(matrix.target, 'UNIX') }}
      ####  run: |
      ####    if [ -d output/UNIX/DPKG ]; then 
      ####      cd output/UNIX/DPKG
      ####      TARGET_PATH=output/UNIX
      ####    else
      ####      TARGET_PATH=output/${{ matrix.target }}
      ####    fi
      ####    echo "----------------------------------------------------------------"
      ####    echo "TARGET_PATH = '$TARGET_PATH'"
      ####    if [ -d $TARGET_PATH/bin ]; then
      ####      echo "ls -l $TARGET_PATH/bin"
      ####      echo "=============================================================="
      ####      ls -l $TARGET_PATH/bin
      ####    else
      ####      echo "dir '$TARGET_PATH/bin' doesn't exist"
      ####    fi
      ####    echo "----------------------------------------------------------------"
  
      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        if: ${{ startsWith(github.ref, 'refs/tags/v') && matrix.target_upload == true && needs.release.outputs.upload_url != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          # asset_path: ${{ env.BINARY_DIR }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          asset_path: ${{ matrix.target_bin }}${{ matrix.target_ext }}
          asset_name: ${{ matrix.target_final }}-${{ matrix.target }}${{ matrix.target_ext }}
          asset_content_type: application/zip
  
      ### - name: Deploy to OpenSoar  / Download server
      ###   if: ${{ github.repository == 'OpenSoaring/OpenSoar' && github.ref == 'refs/heads/master' }}
      ###   uses: easingthemes/ssh-deploy@main
      ###   env:
      ###     SSH_PRIVATE_KEY: ${{ secrets.REPOSITORY_SSH_KEY }}
      ###     ARGS: "-rltgoDzvO"
      ###     # SOURCE: ${{ env.BINARY_DIR }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
      ###     SOURCE: ${{ matrix.target_bin }}${{ matrix.target_ext }}
      ###     REMOTE_HOST: ${{ secrets.REPOSITORY_HOST }}
      ###     REMOTE_USER: ${{ secrets.REPOSITORY_SSH_USER }}
      ###     TARGET: ${{ secrets.REPOSITORY_REMOTE_PATH }}/testing/${{ matrix.target }}/
      ###     SCRIPT_BEFORE: mkdir -p ${{ secrets.REPOSITORY_REMOTE_PATH }}/testing/${{ matrix.target }}

      - name: Upload Program Files via FTP
        if: false
        uses: airvzxf/ftp-deployment-action@latest
        with:
          server: ${{ secrets.FTP_SERVER }}
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_dir: public/${{ matrix.target }}
          # local_dir: ${{ env.BINARY_DIR }}
          # remote_dir: "./"
          max_retries: 2
          ftp_ssl_allow: true

      - name: Deploy to Download server - testing
        if: ${{ github.repository == 'August2111/OpenSoar' && github.ref == 'refs/heads/master' }}
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.REPOSITORY_SSH_KEY }}
          ARGS: "-rltgoDzvO"
          # SOURCE: ${{ env.BINARY_DIR }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          SOURCE: ${{ matrix.target_bin }}${{ matrix.target_ext }}
          REMOTE_HOST: ${{ secrets.REPOSITORY_HOST }}
          REMOTE_USER: ${{ secrets.REPOSITORY_SSH_USER }}
          TARGET: ${{ secrets.REPOSITORY_REMOTE_PATH }}/testing/${{ matrix.target }}/
          SCRIPT_BEFORE: mkdir -p ${{ secrets.REPOSITORY_REMOTE_PATH }}/testing/${{ matrix.target }}

      - name: Deploy to Download server - release
        if: ${{ github.repository == 'OpenSoaring/OpenSoar' && startsWith(github.ref, 'refs/tags/v') && matrix.target_upload == true }}
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.REPOSITORY_SSH_KEY }}
          ARGS: "-rltgoDzvO"
          # SOURCE: ${{ env.BINARY_DIR }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          SOURCE: ${{ matrix.target_bin }}${{ matrix.target_ext }}
          REMOTE_HOST: ${{ secrets.REPOSITORY_HOST }}
